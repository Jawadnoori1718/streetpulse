# StreetPulse Backend Configuration

server.port=8080

# H2 embedded database — no PostgreSQL install required
spring.datasource.url=jdbc:h2:file:./streetpulse-db;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 web console (optional, access at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.sql.init.mode=never

spring.application.name=StreetPulse

logging.level.com.streetpulse=INFO

# ── Police UK ingestion ────────────────────────────────────────────────
# Months of history to merge (each month = one upstream API call).
police.history.months=12
# How long merged police data is cached before a refresh is allowed (minutes).
police.cache.ttl-minutes=360

# ── Risk model (baseline) ──────────────────────────────────────────────
# Spatial kernel bandwidth in metres — larger = smoother, wider influence.
risk.bandwidth-metres=400

# Never hardcode a real key here — this file is committed to source control.
# Provide the key at runtime via the GEMINI_API_KEY environment variable.
# Gemini's free tier powers both the single-shot analyser and the tool-using AI agent.
# When unset, the AI assistant transparently falls back to data-driven analysis (no key needed).
gemini.api.key=${GEMINI_API_KEY:}
